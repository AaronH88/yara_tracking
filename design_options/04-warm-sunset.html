<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme 4: Warm Sunset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sunset-cream': '#FFF8F0',
                        'sunset-peach': '#FFDBC5',
                        'sunset-coral': '#FF9B85',
                        'sunset-terracotta': '#D76A53',
                        'sunset-gold': '#F5C469',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-sunset-cream to-sunset-peach/30 min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-sunset-coral/20 px-4 py-3 sticky top-0">
        <div class="flex items-center justify-between">
            <div class="text-lg font-bold text-sunset-terracotta">Baby Yara</div>
            <div class="bg-sunset-peach rounded-full px-3 py-1 text-sm font-bold text-sunset-terracotta">Mom</div>
        </div>
    </header>

    <main class="p-4 space-y-6 max-w-md mx-auto">
        <!-- Active Timer -->
        <section>
            <h2 class="text-xs font-bold uppercase tracking-wider text-sunset-terracotta/70 mb-3">Active Timers</h2>
            <div class="bg-gradient-to-br from-sunset-coral to-sunset-terracotta rounded-3xl p-6 shadow-2xl">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-3xl">🍼</span>
                    <span class="text-xs font-bold text-white bg-white/25 rounded-full px-3 py-1 backdrop-blur-sm">Bottle</span>
                </div>
                <div class="text-6xl font-bold text-white mb-2">12:34</div>
                <div class="text-sm text-white/90 mb-4">Started 12:34 ago</div>
                <button class="w-full bg-white hover:bg-sunset-cream text-sunset-terracotta font-bold py-3 rounded-full shadow-lg transition-all active:scale-95">
                    Stop Feed
                </button>
            </div>
        </section>

        <!-- Quick Log -->
        <section>
            <h2 class="text-xs font-bold uppercase tracking-wider text-sunset-terracotta/70 mb-3">Quick Log</h2>
            <div class="grid grid-cols-3 gap-3 mb-3">
                <button class="bg-white hover:bg-sunset-gold/20 border-2 border-sunset-gold/40 rounded-xl py-5 flex flex-col items-center justify-center shadow-lg transition-all active:scale-95">
                    <span class="text-2xl mb-1">💧</span>
                    <span class="text-sm font-bold text-sunset-terracotta">Wet</span>
                </button>
                <button class="bg-white hover:bg-sunset-coral/20 border-2 border-sunset-coral/40 rounded-xl py-5 flex flex-col items-center justify-center shadow-lg transition-all active:scale-95">
                    <span class="text-2xl mb-1">💩</span>
                    <span class="text-sm font-bold text-sunset-terracotta">Dirty</span>
                </button>
                <button class="bg-white hover:bg-sunset-peach border-2 border-sunset-peach rounded-xl py-5 flex flex-col items-center justify-center shadow-lg transition-all active:scale-95">
                    <span class="text-2xl mb-1">💧💩</span>
                    <span class="text-sm font-bold text-sunset-terracotta">Both</span>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button class="bg-gradient-to-br from-sunset-coral to-sunset-terracotta hover:shadow-2xl text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                    🍼 Log Feed
                </button>
                <button class="bg-gradient-to-br from-sunset-gold to-sunset-coral hover:shadow-2xl text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                    😴 Log Sleep
                </button>
            </div>
            <button class="mt-3 w-full bg-white hover:bg-sunset-peach border-2 border-dashed border-sunset-coral/50 text-sunset-terracotta font-bold py-3 rounded-xl transition-all active:scale-95">
                📝 Log Past Event
            </button>
        </section>

        <!-- Last Events -->
        <section>
            <h2 class="text-xs font-bold uppercase tracking-wider text-sunset-terracotta/70 mb-3">Last Events</h2>

            <!-- Since Last Feed -->
            <div class="mb-3 bg-gradient-to-r from-sunset-gold to-sunset-coral rounded-2xl p-5 text-center shadow-xl">
                <p class="text-xs text-white uppercase tracking-wider font-bold mb-1">Since last feed</p>
                <p class="text-4xl font-bold text-white">2h 15m</p>
            </div>

            <div class="space-y-3">
                <!-- Last Feed Card -->
                <div class="bg-white rounded-xl p-4 shadow-lg border-l-4 border-sunset-coral">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-bold text-sunset-terracotta">Last Feed</p>
                        <p class="text-xs text-gray-500">2h 15m ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-sunset-peach text-sunset-terracotta px-3 py-1 rounded-full font-bold">Bottle</span>
                        <span class="text-xs text-gray-500 font-medium">(12m)</span>
                    </div>
                </div>

                <!-- Last Sleep Card -->
                <div class="bg-white rounded-xl p-4 shadow-lg border-l-4 border-sunset-gold">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-bold text-sunset-terracotta">Last Sleep</p>
                        <p class="text-xs text-gray-500">4h ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-sunset-gold/40 text-sunset-terracotta px-3 py-1 rounded-full font-bold">Nap</span>
                        <span class="text-xs text-gray-500 font-medium">(1h 23m)</span>
                    </div>
                </div>

                <!-- Last Diaper Card -->
                <div class="bg-white rounded-xl p-4 shadow-lg border-l-4 border-sunset-coral">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-bold text-sunset-terracotta">Last Diaper</p>
                        <p class="text-xs text-gray-500">1h 30m ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-sunset-peach text-sunset-terracotta px-3 py-1 rounded-full font-bold">Wet</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-sunset-coral/20 pb-safe">
        <div class="flex justify-around py-2">
            <button class="flex flex-col items-center p-2 text-sunset-terracotta">
                <div class="text-2xl mb-1">🏠</div>
                <div class="text-xs font-bold">Home</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">📊</div>
                <div class="text-xs">History</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">📅</div>
                <div class="text-xs">Calendar</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">⚙️</div>
                <div class="text-xs">Settings</div>
            </button>
        </div>
    </nav>
</body>
</html>
