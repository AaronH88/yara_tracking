<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme 2: Soft Pink Dream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'blush': '#FFF5F7',
                        'rose-mist': '#FFE8EC',
                        'dusty-rose': '#F4C8CE',
                        'mauve': '#E8D5D9',
                        'cream': '#FFF9F5',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body class="bg-blush min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-dusty-rose/30 px-4 py-3 sticky top-0">
        <div class="flex items-center justify-between">
            <div class="text-lg font-semibold text-rose-900">Baby Yara</div>
            <div class="bg-rose-mist rounded-full px-3 py-1 text-sm font-medium text-rose-700">Mom</div>
        </div>
    </header>

    <main class="p-4 space-y-6 max-w-md mx-auto">
        <!-- Active Timer -->
        <section>
            <h2 class="text-xs font-semibold uppercase tracking-wider text-rose-400 mb-3">Active Timers</h2>
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-dusty-rose/40">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-2xl">🍼</span>
                    <span class="text-xs font-medium text-rose-600 bg-rose-mist rounded-full px-3 py-1">Bottle</span>
                </div>
                <div class="text-5xl font-light text-rose-900 mb-2">12:34</div>
                <div class="text-sm text-rose-500 mb-4">Started 12:34 ago</div>
                <button class="w-full bg-dusty-rose hover:bg-rose-300 text-rose-900 font-medium py-3 rounded-full shadow-sm transition-all active:scale-95">
                    Stop Feed
                </button>
            </div>
        </section>

        <!-- Quick Log -->
        <section>
            <h2 class="text-xs font-semibold uppercase tracking-wider text-rose-400 mb-3">Quick Log</h2>
            <div class="grid grid-cols-3 gap-3 mb-3">
                <button class="bg-white hover:bg-rose-mist border border-rose-200 rounded-2xl py-5 flex flex-col items-center justify-center shadow-sm transition-all active:scale-95">
                    <span class="text-2xl mb-1">💧</span>
                    <span class="text-sm font-medium text-rose-700">Wet</span>
                </button>
                <button class="bg-white hover:bg-rose-mist border border-rose-200 rounded-2xl py-5 flex flex-col items-center justify-center shadow-sm transition-all active:scale-95">
                    <span class="text-2xl mb-1">💩</span>
                    <span class="text-sm font-medium text-rose-700">Dirty</span>
                </button>
                <button class="bg-white hover:bg-rose-mist border border-rose-200 rounded-2xl py-5 flex flex-col items-center justify-center shadow-sm transition-all active:scale-95">
                    <span class="text-2xl mb-1">💧💩</span>
                    <span class="text-sm font-medium text-rose-700">Both</span>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button class="bg-white hover:bg-rose-mist border border-dusty-rose text-rose-800 font-medium py-4 rounded-2xl shadow-sm transition-all active:scale-95">
                    🍼 Log Feed
                </button>
                <button class="bg-white hover:bg-rose-mist border border-dusty-rose text-rose-800 font-medium py-4 rounded-2xl shadow-sm transition-all active:scale-95">
                    😴 Log Sleep
                </button>
            </div>
            <button class="mt-3 w-full bg-cream hover:bg-rose-mist border border-dashed border-rose-300 text-rose-600 font-medium py-3 rounded-2xl transition-all active:scale-95">
                📝 Log Past Event
            </button>
        </section>

        <!-- Last Events -->
        <section>
            <h2 class="text-xs font-semibold uppercase tracking-wider text-rose-400 mb-3">Last Events</h2>

            <!-- Since Last Feed -->
            <div class="mb-3 bg-rose-mist rounded-2xl p-4 text-center shadow-sm border border-dusty-rose/40">
                <p class="text-xs text-rose-500 uppercase tracking-wide font-medium mb-1">Since last feed</p>
                <p class="text-3xl font-light text-rose-900">2h 15m</p>
            </div>

            <div class="space-y-3">
                <!-- Last Feed Card -->
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-rose-100">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-medium text-rose-900">Last Feed</p>
                        <p class="text-xs text-rose-400">2h 15m ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-rose-mist text-rose-700 px-2 py-1 rounded-full font-medium">Bottle</span>
                        <span class="text-xs text-rose-400">(12m)</span>
                    </div>
                </div>

                <!-- Last Sleep Card -->
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-rose-100">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-medium text-rose-900">Last Sleep</p>
                        <p class="text-xs text-rose-400">4h ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-rose-mist text-rose-700 px-2 py-1 rounded-full font-medium">Nap</span>
                        <span class="text-xs text-rose-400">(1h 23m)</span>
                    </div>
                </div>

                <!-- Last Diaper Card -->
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-rose-100">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-medium text-rose-900">Last Diaper</p>
                        <p class="text-xs text-rose-400">1h 30m ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-rose-mist text-rose-700 px-2 py-1 rounded-full font-medium">Wet</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-dusty-rose/30 pb-safe">
        <div class="flex justify-around py-2">
            <button class="flex flex-col items-center p-2 text-rose-600">
                <div class="text-2xl mb-1">🏠</div>
                <div class="text-xs font-medium">Home</div>
            </button>
            <button class="flex flex-col items-center p-2 text-rose-300">
                <div class="text-2xl mb-1">📊</div>
                <div class="text-xs">History</div>
            </button>
            <button class="flex flex-col items-center p-2 text-rose-300">
                <div class="text-2xl mb-1">📅</div>
                <div class="text-xs">Calendar</div>
            </button>
            <button class="flex flex-col items-center p-2 text-rose-300">
                <div class="text-2xl mb-1">⚙️</div>
                <div class="text-xs">Settings</div>
            </button>
        </div>
    </nav>
</body>
</html>
