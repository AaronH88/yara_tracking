<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme 1: Pastel Paradise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pastel-mint': '#D4F4DD',
                        'pastel-lavender': '#E3D5FF',
                        'pastel-peach': '#FFE5CC',
                        'pastel-sky': '#D4E8FF',
                        'pastel-rose': '#FFD5E5',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pastel-mint to-pastel-sky min-h-screen">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-sm border-b border-pastel-lavender/30 px-4 py-3 sticky top-0">
        <div class="flex items-center justify-between">
            <div class="text-lg font-semibold text-gray-700">Baby Yara</div>
            <div class="bg-pastel-lavender rounded-full px-3 py-1 text-sm font-medium text-purple-700">Mom</div>
        </div>
    </header>

    <main class="p-4 space-y-6 max-w-md mx-auto">
        <!-- Active Timer -->
        <section>
            <h2 class="text-xs font-bold uppercase tracking-wider text-purple-600 mb-3">Active Timers</h2>
            <div class="bg-gradient-to-r from-pastel-peach to-pastel-rose rounded-3xl p-5 shadow-lg border-2 border-orange-200">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-2xl">🍼</span>
                    <span class="text-xs font-semibold text-orange-700 bg-white/60 rounded-full px-3 py-1">Bottle</span>
                </div>
                <div class="text-5xl font-bold text-orange-800 mb-2">12:34</div>
                <div class="text-sm text-orange-600 mb-4">Started 12:34 ago</div>
                <button class="w-full bg-orange-600 hover:bg-orange-700 text-white font-semibold py-3 rounded-2xl shadow-md transition-all active:scale-95">
                    Stop Feed
                </button>
            </div>
        </section>

        <!-- Quick Log -->
        <section>
            <h2 class="text-xs font-bold uppercase tracking-wider text-purple-600 mb-3">Quick Log</h2>
            <div class="grid grid-cols-3 gap-3 mb-3">
                <button class="bg-white hover:bg-pastel-sky border-2 border-blue-200 rounded-2xl py-5 flex flex-col items-center justify-center shadow-md transition-all active:scale-95">
                    <span class="text-2xl mb-1">💧</span>
                    <span class="text-sm font-semibold text-blue-700">Wet</span>
                </button>
                <button class="bg-white hover:bg-pastel-peach border-2 border-orange-200 rounded-2xl py-5 flex flex-col items-center justify-center shadow-md transition-all active:scale-95">
                    <span class="text-2xl mb-1">💩</span>
                    <span class="text-sm font-semibold text-orange-700">Dirty</span>
                </button>
                <button class="bg-white hover:bg-pastel-lavender border-2 border-purple-200 rounded-2xl py-5 flex flex-col items-center justify-center shadow-md transition-all active:scale-95">
                    <span class="text-2xl mb-1">💧💩</span>
                    <span class="text-sm font-semibold text-purple-700">Both</span>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button class="bg-gradient-to-br from-pastel-peach to-orange-200 border-2 border-orange-300 hover:shadow-lg text-orange-800 font-semibold py-4 rounded-2xl shadow-md transition-all active:scale-95">
                    🍼 Log Feed
                </button>
                <button class="bg-gradient-to-br from-pastel-lavender to-purple-200 border-2 border-purple-300 hover:shadow-lg text-purple-800 font-semibold py-4 rounded-2xl shadow-md transition-all active:scale-95">
                    😴 Log Sleep
                </button>
            </div>
            <button class="mt-3 w-full bg-white/70 hover:bg-pastel-mint border-2 border-dashed border-green-300 text-green-700 font-medium py-3 rounded-2xl transition-all active:scale-95">
                📝 Log Past Event
            </button>
        </section>

        <!-- Last Events -->
        <section>
            <h2 class="text-xs font-bold uppercase tracking-wider text-purple-600 mb-3">Last Events</h2>

            <!-- Since Last Feed -->
            <div class="mb-3 bg-gradient-to-r from-pastel-rose to-pastel-peach rounded-2xl p-4 text-center shadow-md border-2 border-orange-200">
                <p class="text-xs text-orange-600 uppercase tracking-wide font-semibold mb-1">Since last feed</p>
                <p class="text-3xl font-bold text-orange-800">2h 15m</p>
            </div>

            <div class="space-y-3">
                <!-- Last Feed Card -->
                <div class="bg-white/90 backdrop-blur-sm rounded-2xl p-4 shadow-md border border-orange-200">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-semibold text-gray-800">Last Feed</p>
                        <p class="text-xs text-gray-500">2h 15m ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-pastel-peach text-orange-700 px-2 py-1 rounded-full font-medium">Bottle</span>
                        <span class="text-xs text-gray-500">(12m)</span>
                    </div>
                </div>

                <!-- Last Sleep Card -->
                <div class="bg-white/90 backdrop-blur-sm rounded-2xl p-4 shadow-md border border-purple-200">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-semibold text-gray-800">Last Sleep</p>
                        <p class="text-xs text-gray-500">4h ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-pastel-lavender text-purple-700 px-2 py-1 rounded-full font-medium">Nap</span>
                        <span class="text-xs text-gray-500">(1h 23m)</span>
                    </div>
                </div>

                <!-- Last Diaper Card -->
                <div class="bg-white/90 backdrop-blur-sm rounded-2xl p-4 shadow-md border border-blue-200">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-semibold text-gray-800">Last Diaper</p>
                        <p class="text-xs text-gray-500">1h 30m ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-pastel-sky text-blue-700 px-2 py-1 rounded-full font-medium">Wet</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-sm border-t border-pastel-lavender/30 pb-safe">
        <div class="flex justify-around py-2">
            <button class="flex flex-col items-center p-2 text-purple-600">
                <div class="text-2xl mb-1">🏠</div>
                <div class="text-xs font-medium">Home</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">📊</div>
                <div class="text-xs">History</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">📅</div>
                <div class="text-xs">Calendar</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">⚙️</div>
                <div class="text-xs">Settings</div>
            </button>
        </div>
    </nav>
</body>
</html>
