<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme 3: Ocean Breeze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ocean-light': '#E0F4F7',
                        'ocean-mist': '#B8E5EC',
                        'ocean-blue': '#6BB6C7',
                        'ocean-deep': '#3E9DAE',
                        'ocean-teal': '#2D7D8C',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-ocean-light to-white min-h-screen">
    <!-- Header -->
    <header class="bg-white/70 backdrop-blur-lg border-b border-ocean-blue/20 px-4 py-3 sticky top-0">
        <div class="flex items-center justify-between">
            <div class="text-lg font-semibold text-ocean-teal">Baby Yara</div>
            <div class="bg-ocean-mist rounded-full px-3 py-1 text-sm font-semibold text-ocean-teal">Mom</div>
        </div>
    </header>

    <main class="p-4 space-y-6 max-w-md mx-auto">
        <!-- Active Timer -->
        <section>
            <h2 class="text-xs font-bold uppercase tracking-wider text-ocean-deep mb-3">Active Timers</h2>
            <div class="bg-gradient-to-br from-ocean-blue to-ocean-deep rounded-3xl p-6 shadow-xl">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-2xl">🍼</span>
                    <span class="text-xs font-semibold text-white bg-white/20 rounded-full px-3 py-1 backdrop-blur-sm">Bottle</span>
                </div>
                <div class="text-5xl font-bold text-white mb-2">12:34</div>
                <div class="text-sm text-white/80 mb-4">Started 12:34 ago</div>
                <button class="w-full bg-white hover:bg-ocean-light text-ocean-deep font-bold py-3 rounded-2xl shadow-md transition-all active:scale-95">
                    Stop Feed
                </button>
            </div>
        </section>

        <!-- Quick Log -->
        <section>
            <h2 class="text-xs font-bold uppercase tracking-wider text-ocean-deep mb-3">Quick Log</h2>
            <div class="grid grid-cols-3 gap-3 mb-3">
                <button class="bg-white hover:bg-ocean-light border-2 border-ocean-blue/30 rounded-2xl py-5 flex flex-col items-center justify-center shadow-md transition-all active:scale-95">
                    <span class="text-2xl mb-1">💧</span>
                    <span class="text-sm font-semibold text-ocean-teal">Wet</span>
                </button>
                <button class="bg-white hover:bg-ocean-light border-2 border-ocean-blue/30 rounded-2xl py-5 flex flex-col items-center justify-center shadow-md transition-all active:scale-95">
                    <span class="text-2xl mb-1">💩</span>
                    <span class="text-sm font-semibold text-ocean-teal">Dirty</span>
                </button>
                <button class="bg-white hover:bg-ocean-light border-2 border-ocean-blue/30 rounded-2xl py-5 flex flex-col items-center justify-center shadow-md transition-all active:scale-95">
                    <span class="text-2xl mb-1">💧💩</span>
                    <span class="text-sm font-semibold text-ocean-teal">Both</span>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button class="bg-ocean-blue hover:bg-ocean-deep text-white font-semibold py-4 rounded-2xl shadow-md transition-all active:scale-95">
                    🍼 Log Feed
                </button>
                <button class="bg-ocean-blue hover:bg-ocean-deep text-white font-semibold py-4 rounded-2xl shadow-md transition-all active:scale-95">
                    😴 Log Sleep
                </button>
            </div>
            <button class="mt-3 w-full bg-white hover:bg-ocean-light border-2 border-dashed border-ocean-blue/50 text-ocean-teal font-semibold py-3 rounded-2xl transition-all active:scale-95">
                📝 Log Past Event
            </button>
        </section>

        <!-- Last Events -->
        <section>
            <h2 class="text-xs font-bold uppercase tracking-wider text-ocean-deep mb-3">Last Events</h2>

            <!-- Since Last Feed -->
            <div class="mb-3 bg-gradient-to-r from-ocean-blue to-ocean-mist rounded-2xl p-4 text-center shadow-md">
                <p class="text-xs text-white uppercase tracking-wide font-semibold mb-1">Since last feed</p>
                <p class="text-3xl font-bold text-white">2h 15m</p>
            </div>

            <div class="space-y-3">
                <!-- Last Feed Card -->
                <div class="bg-white rounded-2xl p-4 shadow-md border-l-4 border-ocean-blue">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-semibold text-ocean-teal">Last Feed</p>
                        <p class="text-xs text-gray-500">2h 15m ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-ocean-light text-ocean-teal px-2 py-1 rounded-full font-semibold">Bottle</span>
                        <span class="text-xs text-gray-500">(12m)</span>
                    </div>
                </div>

                <!-- Last Sleep Card -->
                <div class="bg-white rounded-2xl p-4 shadow-md border-l-4 border-ocean-blue">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-semibold text-ocean-teal">Last Sleep</p>
                        <p class="text-xs text-gray-500">4h ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-ocean-light text-ocean-teal px-2 py-1 rounded-full font-semibold">Nap</span>
                        <span class="text-xs text-gray-500">(1h 23m)</span>
                    </div>
                </div>

                <!-- Last Diaper Card -->
                <div class="bg-white rounded-2xl p-4 shadow-md border-l-4 border-ocean-blue">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-semibold text-ocean-teal">Last Diaper</p>
                        <p class="text-xs text-gray-500">1h 30m ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-ocean-light text-ocean-teal px-2 py-1 rounded-full font-semibold">Wet</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-ocean-blue/20 pb-safe">
        <div class="flex justify-around py-2">
            <button class="flex flex-col items-center p-2 text-ocean-deep">
                <div class="text-2xl mb-1">🏠</div>
                <div class="text-xs font-semibold">Home</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">📊</div>
                <div class="text-xs">History</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">📅</div>
                <div class="text-xs">Calendar</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">⚙️</div>
                <div class="text-xs">Settings</div>
            </button>
        </div>
    </nav>
</body>
</html>
