<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme 5: Forest Meadow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sage-light': '#E8F3E8',
                        'sage': '#C5D9C5',
                        'moss': '#8FAB8F',
                        'forest': '#5D7A5D',
                        'earth': '#A6916C',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
    </style>
</head>
<body class="bg-sage-light min-h-screen">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-sm border-b border-sage px-4 py-3 sticky top-0">
        <div class="flex items-center justify-between">
            <div class="text-lg font-semibold text-forest">Baby Yara</div>
            <div class="bg-sage rounded-full px-3 py-1 text-sm font-semibold text-forest">Mom</div>
        </div>
    </header>

    <main class="p-4 space-y-6 max-w-md mx-auto">
        <!-- Active Timer -->
        <section>
            <h2 class="text-xs font-semibold uppercase tracking-wider text-moss mb-3">Active Timers</h2>
            <div class="bg-gradient-to-br from-moss to-forest rounded-3xl p-6 shadow-xl border border-sage">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-2xl">🍼</span>
                    <span class="text-xs font-semibold text-sage-light bg-white/20 rounded-full px-3 py-1 backdrop-blur-sm">Bottle</span>
                </div>
                <div class="text-5xl font-semibold text-white mb-2">12:34</div>
                <div class="text-sm text-sage-light mb-4">Started 12:34 ago</div>
                <button class="w-full bg-sage-light hover:bg-white text-forest font-semibold py-3 rounded-2xl shadow-md transition-all active:scale-95">
                    Stop Feed
                </button>
            </div>
        </section>

        <!-- Quick Log -->
        <section>
            <h2 class="text-xs font-semibold uppercase tracking-wider text-moss mb-3">Quick Log</h2>
            <div class="grid grid-cols-3 gap-3 mb-3">
                <button class="bg-white hover:bg-sage-light border-2 border-sage rounded-2xl py-5 flex flex-col items-center justify-center shadow-md transition-all active:scale-95">
                    <span class="text-2xl mb-1">💧</span>
                    <span class="text-sm font-semibold text-forest">Wet</span>
                </button>
                <button class="bg-white hover:bg-sage-light border-2 border-sage rounded-2xl py-5 flex flex-col items-center justify-center shadow-md transition-all active:scale-95">
                    <span class="text-2xl mb-1">💩</span>
                    <span class="text-sm font-semibold text-forest">Dirty</span>
                </button>
                <button class="bg-white hover:bg-sage-light border-2 border-sage rounded-2xl py-5 flex flex-col items-center justify-center shadow-md transition-all active:scale-95">
                    <span class="text-2xl mb-1">💧💩</span>
                    <span class="text-sm font-semibold text-forest">Both</span>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button class="bg-moss hover:bg-forest text-white font-semibold py-4 rounded-2xl shadow-md transition-all active:scale-95">
                    🍼 Log Feed
                </button>
                <button class="bg-earth hover:bg-earth/90 text-white font-semibold py-4 rounded-2xl shadow-md transition-all active:scale-95">
                    😴 Log Sleep
                </button>
            </div>
            <button class="mt-3 w-full bg-white hover:bg-sage-light border-2 border-dashed border-moss text-forest font-semibold py-3 rounded-2xl transition-all active:scale-95">
                📝 Log Past Event
            </button>
        </section>

        <!-- Last Events -->
        <section>
            <h2 class="text-xs font-semibold uppercase tracking-wider text-moss mb-3">Last Events</h2>

            <!-- Since Last Feed -->
            <div class="mb-3 bg-gradient-to-r from-sage to-moss rounded-2xl p-4 text-center shadow-md border-2 border-sage">
                <p class="text-xs text-forest uppercase tracking-wide font-semibold mb-1">Since last feed</p>
                <p class="text-3xl font-semibold text-forest">2h 15m</p>
            </div>

            <div class="space-y-3">
                <!-- Last Feed Card -->
                <div class="bg-white rounded-2xl p-4 shadow-md border-l-4 border-moss">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-semibold text-forest">Last Feed</p>
                        <p class="text-xs text-gray-500">2h 15m ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-sage text-forest px-2 py-1 rounded-full font-semibold">Bottle</span>
                        <span class="text-xs text-gray-500">(12m)</span>
                    </div>
                </div>

                <!-- Last Sleep Card -->
                <div class="bg-white rounded-2xl p-4 shadow-md border-l-4 border-earth">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-semibold text-forest">Last Sleep</p>
                        <p class="text-xs text-gray-500">4h ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-earth/20 text-earth px-2 py-1 rounded-full font-semibold">Nap</span>
                        <span class="text-xs text-gray-500">(1h 23m)</span>
                    </div>
                </div>

                <!-- Last Diaper Card -->
                <div class="bg-white rounded-2xl p-4 shadow-md border-l-4 border-moss">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-semibold text-forest">Last Diaper</p>
                        <p class="text-xs text-gray-500">1h 30m ago</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-sage text-forest px-2 py-1 rounded-full font-semibold">Wet</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-sm border-t border-sage pb-safe">
        <div class="flex justify-around py-2">
            <button class="flex flex-col items-center p-2 text-forest">
                <div class="text-2xl mb-1">🏠</div>
                <div class="text-xs font-semibold">Home</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">📊</div>
                <div class="text-xs">History</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">📅</div>
                <div class="text-xs">Calendar</div>
            </button>
            <button class="flex flex-col items-center p-2 text-gray-400">
                <div class="text-2xl mb-1">⚙️</div>
                <div class="text-xs">Settings</div>
            </button>
        </div>
    </nav>
</body>
</html>
